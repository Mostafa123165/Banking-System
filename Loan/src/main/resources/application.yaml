server:
  port: 0

spring:
  application:
    name: "loan"

  datasource:
    url: jdbc:mysql://localhost:3312/loanDb
    username: root
    password: root

  profiles:
    active: "prod"

  config:
    import: "optional:configserver:http://localhost:8071/"

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/


management:
  endpoints:
    web:
      exposure:
        include: "*"


logging:
  level:
    com:
      eazyBank:
        Loan: DEBUG
